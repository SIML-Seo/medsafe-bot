<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="data:," />
    <title>복약안전 봇</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f3f5f7;
        --surface: #fff;
        --ink: #17202b;
        --muted: #667085;
        --line: #d9dee7;
        --red: #c92f3b;
        --yellow: #d28b00;
        --green: #247a52;
        --neutral: #475467;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--page); color: var(--ink); font-family: Inter, Pretendard, system-ui, -apple-system, "Segoe UI", sans-serif; }
      main { width: min(720px, calc(100% - 24px)); margin: 24px auto 48px; }
      header { display: flex; align-items: end; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
      h1 { margin: 0; font-size: 23px; line-height: 1.25; letter-spacing: 0; }
      .source { color: var(--muted); font-size: 12px; }
      .tabs { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); margin-bottom: 12px; border: 1px solid var(--line); border-radius: 6px; overflow: hidden; background: var(--surface); }
      .tabs button { min-height: 42px; padding: 8px; border: 0; border-right: 1px solid var(--line); background: transparent; color: var(--neutral); font: inherit; font-size: 13px; cursor: pointer; }
      .tabs button:last-child { border-right: 0; }
      .tabs button[aria-selected="true"] { background: #e9edf3; color: var(--ink); font-weight: 700; }
      .widget { overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); box-shadow: 0 8px 24px rgb(23 32 43 / 7%); }
      .signal { height: 7px; background: var(--neutral); }
      .widget[data-tone="red"] .signal { background: var(--red); }
      .widget[data-tone="yellow"] .signal { background: var(--yellow); }
      .widget[data-tone="green"] .signal { background: var(--green); }
      .content { padding: 20px; }
      .eyebrow { margin: 0 0 5px; color: var(--muted); font-size: 12px; font-weight: 800; }
      h2 { margin: 0; font-size: 19px; line-height: 1.4; letter-spacing: 0; }
      .summary { margin: 8px 0 0; color: var(--muted); font-size: 14px; line-height: 1.55; }
      .list { margin-top: 18px; border-top: 1px solid var(--line); }
      .row { padding: 15px 0; border-bottom: 1px solid var(--line); }
      .row:last-child { border-bottom: 0; }
      .row-title { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 6px; font-size: 14px; font-weight: 750; }
      .badge { flex: 0 0 auto; color: var(--muted); font-size: 11px; font-weight: 800; }
      .reason, .meta { margin: 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
      .meta { margin-top: 7px; font-size: 11px; }
      .choices { display: grid; gap: 8px; margin-top: 10px; }
      .choice { min-height: 46px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 6px; background: var(--surface); color: var(--ink); text-align: left; cursor: pointer; }
      .choice:hover, .choice:focus-visible { border-color: #7a8699; outline: none; background: #f8fafc; }
      .choice[aria-pressed="true"] { border-color: var(--ink); background: #eef2f6; box-shadow: inset 3px 0 0 var(--ink); }
      .choice strong, .choice span { display: block; }
      .choice span { margin-top: 3px; color: var(--muted); font-size: 12px; }
      .notice { margin: 18px 0 0; padding-top: 15px; border-top: 1px solid var(--line); color: var(--muted); font-size: 12px; line-height: 1.55; }
      .emergency, .failure { color: var(--red); }
      .empty { padding: 18px 0 2px; color: var(--muted); font-size: 13px; }
      @media (max-width: 520px) {
        header { align-items: start; flex-direction: column; }
        .tabs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .tabs button { border-bottom: 1px solid var(--line); }
        .tabs button:nth-child(even) { border-right: 0; }
        .tabs button:nth-last-child(-n+2) { border-bottom: 0; }
        .content { padding: 17px; }
        .row-title { flex-direction: column; gap: 4px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header><h1>복약안전 봇</h1><span class="source">식약처 공개데이터 기준</span></header>
      <nav class="tabs" aria-label="결과 상태">
        <button type="button" data-sample="ambiguous" aria-selected="true">후보 확인</button>
        <button type="button" data-sample="caution" aria-selected="false">중복성분</button>
        <button type="button" data-sample="uncertain" aria-selected="false">검사 보류</button>
        <button type="button" data-sample="warn" aria-selected="false">병용금기</button>
        <button type="button" data-sample="emergency" aria-selected="false">응급 우선</button>
        <button type="button" data-sample="explain" aria-selected="false">약 설명</button>
      </nav>
      <section id="widget" class="widget" aria-live="polite"></section>
    </main>
    <script>
      const disclaimer = "본 정보는 식약처 공개데이터 기반 일반 참고용이며 의사·약사의 진단·처방·복약지도를 대체하지 않습니다.";
      const samples = {
        ambiguous: {
          dataAsOf: "2026-07-10",
          resolved: [
            { query: "타이레놀", status: "AMBIGUOUS", candidates: [
              { itemSeq: "202106092", ingrCode: "", matchedName: "타이레놀정500밀리그람(아세트아미노펜)", manufacturer: "켄뷰코리아판매유한회사" },
              { itemSeq: "202200407", ingrCode: "", matchedName: "타이레놀8시간이알서방정(아세트아미노펜)", manufacturer: "한국얀센" }
            ] },
            { query: "없는 약", status: "NOT_FOUND", candidates: [] }
          ]
        },
        caution: {
          verdict: "CAUTION", dataAsOf: "2026-07-10",
          findings: [{ type: "DUP_INGREDIENT", level: "YELLOW", a: "타이레놀정500밀리그람", b: "게보린정", reason: "아세트아미노펜 성분이 겹칩니다.", source: "MFDS DUR 품목 성분 스냅샷", baseDate: "2026-07-10", dateBasis: "SNAPSHOT_FETCHED_AT" }],
          unresolved: [], checkedTypes: ["DUP_INPUT", "DUP_INGREDIENT", "USJNT_TABOO"], failedTypes: [], disclaimer
        },
        uncertain: {
          verdict: "NO_KNOWN_FINDINGS", dataAsOf: "2026-07-10",
          findings: [],
          unresolved: ["성분 DUR 카탈로그에 매핑되지 않은 품목이 포함되어 판정을 보류합니다."],
          checkedTypes: ["DUP_INPUT", "DUP_INGREDIENT"], failedTypes: ["USJNT_TABOO"], disclaimer
        },
        warn: {
          verdict: "WARN", dataAsOf: "2026-07-10",
          findings: [{ type: "USJNT_TABOO", level: "RED", a: "아스피린프로텍트정100밀리그람", b: "유한메토트렉세이트정", reason: "혈액학적 독성", source: "식약처 DUR 품목정보 API 스냅샷", baseDate: "2026-07-10", dateBasis: "SNAPSHOT_FETCHED_AT" }],
          unresolved: [], checkedTypes: ["DUP_INPUT", "DUP_INGREDIENT", "USJNT_TABOO"], failedTypes: [], disclaimer
        },
        emergency: { emergency: true, resolved: [], dataAsOf: "2026-07-10" },
        explain: {
          found: true, status: "FOUND", error: null, dataAsOf: "2026-07-10",
          info: { itemSeq: "202106092", itemName: "타이레놀정500밀리그람(아세트아미노펜)", entpName: "켄뷰코리아판매유한회사", efcyQesitm: "감기로 인한 발열 및 동통, 두통, 신경통, 근육통 등의 완화에 사용합니다.", useMethodQesitm: "제품 설명서와 의사·약사의 복약지도를 따르세요.", atpnQesitm: "다른 아세트아미노펜 함유 의약품과 함께 복용하지 않도록 확인하세요." }
        }
      };

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>'"]/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;" })[char]);
      }

      function dateBasisLabel(value) {
        return ({ SOURCE_DATE: "원천 기준일", SNAPSHOT_FETCHED_AT: "스냅샷 수집일", LOCAL_POLICY_DATE: "정책 기준일", FIXTURE_DATE: "fixture 기준일" })[value] || "날짜";
      }

      function renderEmergency(payload) {
        return { tone: "red", html: `<div class="signal"></div><div class="content"><p class="eyebrow">EMERGENCY</p><h2 class="emergency">즉시 119 또는 응급실에 연락하세요</h2><p class="summary">응급 신호가 감지되어 약 이름 확인보다 긴급 도움 요청을 우선합니다.</p><p class="notice">${escapeHtml(disclaimer)} · 정책 기준일 ${escapeHtml(payload.dataAsOf || "미상")}</p></div>` };
      }

      function renderResolve(payload) {
        if (payload.emergency === true) return renderEmergency(payload);
        const rows = (payload.resolved ?? []).map((item, itemIndex) => {
          if (item.status === "AMBIGUOUS") {
            const choices = (item.candidates ?? []).map((candidate, candidateIndex) => `<button class="choice" type="button" aria-pressed="false" data-query="${escapeHtml(item.query)}" data-item-index="${itemIndex}" data-candidate-index="${candidateIndex}" data-item-seq="${escapeHtml(candidate.itemSeq)}" data-ingr-code="${escapeHtml(candidate.ingrCode)}" data-matched-name="${escapeHtml(candidate.matchedName)}"><strong>${escapeHtml(candidate.matchedName)}</strong><span>${escapeHtml(candidate.manufacturer || "제조사 정보 없음")}</span></button>`).join("");
            return `<div class="row"><div class="row-title"><span>${escapeHtml(item.query)}</span><span class="badge">후보 확인</span></div><div class="choices">${choices}</div></div>`;
          }
          const label = item.status === "CONFIRMED" ? "품목 확인" : item.status === "OUT_OF_SCOPE" ? "범위 밖" : "찾지 못함";
          return `<div class="row"><div class="row-title"><span>${escapeHtml(item.query)}</span><span class="badge">${label}</span></div><p class="reason">${escapeHtml(item.matchedName || "확정할 수 있는 의약품 품목이 없습니다.")}</p></div>`;
        }).join("");
        return { tone: "yellow", html: `<div class="signal"></div><div class="content"><p class="eyebrow">RESOLVE</p><h2>의약품 품목 확인 결과</h2><div class="list">${rows || '<p class="empty">확인된 항목이 없습니다.</p>'}</div><p class="notice">데이터 기준일 ${escapeHtml(payload.dataAsOf || "미상")}</p></div>` };
      }

      function renderSafety(payload) {
        const emergency = payload.findings?.some((finding) => finding.type === "EMERGENCY");
        if (emergency) return renderEmergency(payload);
        const incomplete = (payload.failedTypes ?? []).length > 0 || (payload.unresolved ?? []).length > 0;
        const verdict = incomplete && payload.verdict === "NO_KNOWN_FINDINGS" ? "UNCERTAIN" : payload.verdict;
        const tone = verdict === "WARN" ? "red" : verdict === "NO_KNOWN_FINDINGS" ? "green" : "yellow";
        const title = verdict === "WARN" ? "병용금기 근거가 확인됐습니다" : verdict === "CAUTION" ? "주의 정보를 확인해주세요" : verdict === "UNCERTAIN" ? "추가 확인이 필요합니다" : "등록된 핵심 위험은 조회되지 않았습니다";
        const rows = (payload.findings ?? []).map((finding) => `<div class="row"><div class="row-title"><span>${escapeHtml(finding.a)}${finding.b ? ` × ${escapeHtml(finding.b)}` : ""}</span><span class="badge">${escapeHtml(finding.type)}</span></div><p class="reason">${escapeHtml(finding.reason)}</p><p class="meta">${escapeHtml(finding.source)} · ${escapeHtml(dateBasisLabel(finding.dateBasis))} ${escapeHtml(finding.baseDate)}</p></div>`).join("");
        const unresolved = (payload.unresolved ?? []).length ? `<p class="notice">확인 필요: ${escapeHtml(payload.unresolved.join(", "))}</p>` : "";
        const failed = (payload.failedTypes ?? []).length ? `<p class="notice failure">완료하지 못한 검사: ${escapeHtml(payload.failedTypes.join(", "))}. 녹색으로 판정하지 않습니다.</p>` : "";
        return { tone, html: `<div class="signal"></div><div class="content"><p class="eyebrow">${escapeHtml(verdict)}</p><h2>${title}</h2><div class="list">${rows || '<p class="empty">표시할 개별 근거가 없습니다.</p>'}</div>${unresolved}${failed}<p class="notice">데이터 기준일 ${escapeHtml(payload.dataAsOf || "미상")} · ${escapeHtml(payload.disclaimer || disclaimer)}</p></div>` };
      }

      function renderExplain(payload) {
        const info = payload.info || {};
        if (!payload.found) return { tone: "yellow", html: `<div class="signal"></div><div class="content"><p class="eyebrow">${escapeHtml(payload.status)}</p><h2>공개 설명 정보를 확인하지 못했습니다</h2><p class="summary">${escapeHtml(payload.error || "해당 품목의 e약은요 정보가 없습니다.")}</p></div>` };
        const sections = [["효능·효과", info.efcyQesitm], ["사용 방법", info.useMethodQesitm], ["주의사항", info.atpnWarnQesitm || info.atpnQesitm]].filter(([, value]) => value).map(([label, value]) => `<div class="row"><div class="row-title"><span>${label}</span></div><p class="reason">${escapeHtml(value)}</p></div>`).join("");
        return { tone: "green", html: `<div class="signal"></div><div class="content"><p class="eyebrow">EASY DRUG</p><h2>${escapeHtml(info.itemName || "의약품 설명")}</h2><p class="summary">${escapeHtml(info.entpName || "제조사 정보 없음")}</p><div class="list">${sections || '<p class="empty">표시할 설명 항목이 없습니다.</p>'}</div><p class="notice">데이터 기준일 ${escapeHtml(payload.dataAsOf || "미상")} · ${escapeHtml(disclaimer)}</p></div>` };
      }

      window.renderMedsafeWidget = function renderMedsafeWidget(structuredContent) {
        const widget = document.getElementById("widget");
        const payload = structuredContent ?? {};
        const rendered = Array.isArray(payload.resolved) ? renderResolve(payload) : Object.hasOwn(payload, "found") && Object.hasOwn(payload, "status") ? renderExplain(payload) : Object.hasOwn(payload, "verdict") ? renderSafety(payload) : { tone: "yellow", html: '<div class="signal"></div><div class="content"><h2>표시할 수 없는 응답입니다</h2></div>' };
        widget.dataset.tone = rendered.tone;
        widget.innerHTML = rendered.html;
        widget.querySelectorAll(".choice").forEach((choice) => {
          choice.addEventListener("click", () => {
            const itemIndex = choice.dataset.itemIndex;
            widget.querySelectorAll(`.choice[data-item-index="${itemIndex}"]`).forEach((item) => item.setAttribute("aria-pressed", String(item === choice)));
            widget.dispatchEvent(new CustomEvent("medsafe:candidate-selected", { bubbles: true, detail: { query: choice.dataset.query, itemSeq: choice.dataset.itemSeq || null, ingrCode: choice.dataset.ingrCode || null, matchedName: choice.dataset.matchedName || null, candidateIndex: Number(choice.dataset.candidateIndex) } }));
          });
        });
      };

      document.querySelectorAll("[data-sample]").forEach((button) => button.addEventListener("click", () => {
        document.querySelectorAll("[data-sample]").forEach((item) => item.setAttribute("aria-selected", String(item === button)));
        window.renderMedsafeWidget(samples[button.dataset.sample]);
      }));
      const requestedSample = new URLSearchParams(window.location.search).get("sample");
      const initialSample = Object.hasOwn(samples, requestedSample) ? requestedSample : "ambiguous";
      document.querySelectorAll("[data-sample]").forEach((item) => item.setAttribute("aria-selected", String(item.dataset.sample === initialSample)));
      window.renderMedsafeWidget(samples[initialSample]);
    </script>
  </body>
</html>
